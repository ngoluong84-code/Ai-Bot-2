<!DOCTYPE html>
<html>
<head>
    <title>BTC AI Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h1 class="mb-4">🚀 BTC AI Trading Dashboard</h1>

    <div class="row mb-4">
        <div class="col-md-3">
            <select id="timeframe" class="form-select">
                <option value="1h">1H</option>
                <option value="4h">4H</option>
                <option value="1d">1D</option>
            </select>
        </div>

        <div class="col-md-3">
            <button class="btn btn-primary w-100" onclick="getPrediction()">
                Get Prediction
            </button>
        </div>

        <div class="col-md-3">
            <button class="btn btn-warning w-100" onclick="trainModel()">
                Retrain Model
            </button>
        </div>
    </div>

    <div class="card bg-secondary p-4 mb-4">
        <h3>Probability: <span id="probability">--</span></h3>
        <h3>Signal: <span id="signal">--</span></h3>
    </div>

    <canvas id="priceChart"></canvas>

</div>

<script>
async function getPrediction() {
    const timeframe = document.getElementById("timeframe").value;

    const res = await fetch("/predict?tf=" + timeframe);
    const data = await res.json();

    document.getElementById("probability").innerText =
        (data.probability * 100).toFixed(2) + "%";

    const signalEl = document.getElementById("signal");
    signalEl.innerText = data.signal;

    if (data.signal === "LONG") {
        signalEl.style.color = "lime";
    } else {
        signalEl.style.color = "red";
    }
}

async function trainModel() {
    await fetch("/train");
    alert("Model retrained!");
}
</script>

</body>
</html>
